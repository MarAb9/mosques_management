services:
  app:
    build:
      context: .
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    environment:
      APP_ENV: development
      APP_TIMEZONE: Africa/Casablanca
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-mosques_management}
      DB_USER: ${DB_USER:-mosques}
      DB_PASS: ${DB_PASS:-mosques_password}
    volumes:
      - ./public/uploads:/var/www/html/public/uploads
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    ports:
      - "127.0.0.1:${DB_PORT_FORWARD:-3307}:3306"
    environment:
      MARIADB_DATABASE: ${DB_NAME:-mosques_management}
      MARIADB_USER: ${DB_USER:-mosques}
      MARIADB_PASSWORD: ${DB_PASS:-mosques_password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-mosques_root_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./ezyro_40059332_mosques_berkane.sql:/docker-entrypoint-initdb.d/01-mosques.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    profiles: ["tools"]
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-mosques}
      PMA_PASSWORD: ${DB_PASS:-mosques_password}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
